name: Build and Deploy to Oracle Cloud

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: '1.26'
  APP_NAME: videosgo
  DEPLOY_HOST: 141.148.0.209
  DEPLOY_USER: root
  DEPLOY_PATH: /opt/videosgo

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Get version
        id: version
        run: |
          if [[ ${{ github.ref }} == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -race -v ./...

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -ldflags="-s -w \
              -X main.Version=${{ steps.version.outputs.version }} \
              -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
              -X main.GitCommit=${{ github.sha }}" \
            -o ${{ env.APP_NAME }} main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-binary
          path: ${{ env.APP_NAME }}
          retention-days: 7

  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out results.sarif ./...'

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  deploy:
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-binary

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config << EOF
          Host deploy-server
            HostName ${{ env.DEPLOY_HOST }}
            User ${{ env.DEPLOY_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF

      - name: Deploy to server
        run: |
          scp -i ~/.ssh/deploy_key ${{ env.APP_NAME }} deploy-server:${{ env.DEPLOY_PATH }}/${{ env.APP_NAME }}.new
          
          if [ -f .env.example ]; then
            scp -i ~/.ssh/deploy_key .env.example deploy-server:${{ env.DEPLOY_PATH }}/
          fi
          
          ssh -i ~/.ssh/deploy_key deploy-server << 'REMOTESCRIPT'
            set -e
            cd /opt/videosgo
            
            if [ -f videosgo ]; then
              cp videosgo videosgo.backup.$(date +%Y%m%d_%H%M%S)
              ls -t videosgo.backup.* 2>/dev/null | tail -n +6 | xargs -r rm -f
            fi
            
            mv videosgo.new videosgo
            chmod +x videosgo
            
            if [ ! -f /etc/systemd/system/videosgo.service ]; then
              cat > /etc/systemd/system/videosgo.service << 'SERVICEFILE'
[Unit]
Description=VideosGo API Server
After=network.target postgresql.service redis-server.service
Wants=postgresql.service redis-server.service

[Service]
Type=simple
User=root
WorkingDirectory=/opt/videosgo
ExecStart=/opt/videosgo/videosgo
Restart=always
RestartSec=5
StandardOutput=journal
StandardError=journal
SyslogIdentifier=videosgo
Environment="PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
Environment="GO_ENV=production"
LimitNOFILE=65536
LimitNPROC=4096

[Install]
WantedBy=multi-user.target
SERVICEFILE
              systemctl daemon-reload
              systemctl enable videosgo
            fi
            
            if ! systemctl is-active --quiet postgresql@18-main; then
              echo "PostgreSQL not running, starting..."
              systemctl start postgresql@18-main || true
            fi
            
            if ! systemctl is-active --quiet redis-server; then
              echo "Redis not running, starting..."
              systemctl start redis-server || true
            fi
            
            systemctl restart videosgo
            sleep 3
            
            for i in {1..10}; do
              if curl -sf http://localhost:8080/health > /dev/null; then
                echo "Service is healthy"
                echo "$(date): Deployed version $(/opt/videosgo/videosgo -version 2>/dev/null || echo 'unknown')" >> /opt/videosgo/deploy.log
                exit 0
              fi
              echo "Waiting for service... ($i/10)"
              sleep 2
            done
            
            echo "Health check failed, rolling back..."
            systemctl stop videosgo
            latest_backup=$(ls -t videosgo.backup.* 2>/dev/null | head -1)
            if [ -n "$latest_backup" ]; then
              cp "$latest_backup" videosgo
              systemctl start videosgo
              echo "Rolled back to $latest_backup"
            fi
            exit 1
          REMOTESCRIPT

      - name: Verify deployment
        run: |
          sleep 5
          curl -sf http://${{ env.DEPLOY_HOST }}:8080/health || exit 1
          curl -sf http://${{ env.DEPLOY_HOST }}:8080/version || exit 1
          echo "Deployment verified"

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
