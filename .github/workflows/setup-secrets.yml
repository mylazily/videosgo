name: Setup Secrets

on:
  workflow_dispatch:
    inputs:
      server_host:
        description: 'Server Host'
        required: true
        default: '141.148.0.209'
      server_user:
        description: 'Server User'
        required: true
        default: 'root'
      server_password:
        description: 'Server Password'
        required: true

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install sodium
        run: npm install sodium-plus

      - name: Set secrets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e "
          const { SodiumPlus } = require('sodium-plus');
          (async () => {
            const sodium = await SodiumPlus.auto();
            const token = process.env.GH_TOKEN;
            const owner = 'mylazily';
            const repo = 'videosgo';

            // Get public key
            const pkResp = await fetch('https://api.github.com/repos/' + owner + '/' + repo + '/actions/secrets/public-key', {
              headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json' }
            });
            const pkData = await pkResp.json();
            const publicKey = await sodium.crypto_box_publickey_from_bytes(Buffer.from(pkData.key, 'base64'));
            const keyId = pkData.key_id;

            async function setSecret(name, value) {
              const nonce = await sodium.randombytes_buf(sodium.crypto_box_NONCEBYTES);
              const ephemeralSk = await sodium.crypto_box_keypair();
              const ephemeralPk = ephemeralSk.publicKey;
              const ciphertext = await sodium.crypto_box(Buffer.from(value), nonce, publicKey, ephemeralSk.privateKey);
              const sealed = Buffer.concat([ephemeralPk, nonce, ciphertext]);
              const encrypted = sealed.toString('base64');

              const resp = await fetch('https://api.github.com/repos/' + owner + '/' + repo + '/actions/secrets/' + name, {
                method: 'PUT',
                headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ encrypted_value: encrypted, key_id: keyId })
              });
              console.log(name + ': ' + (resp.ok ? 'OK' : 'FAIL ' + resp.status));
            }

            await setSecret('SERVER_HOST', '${{ github.event.inputs.server_host }}');
            await setSecret('SERVER_USER', '${{ github.event.inputs.server_user }}');
            await setSecret('SERVER_PASSWORD', '${{ github.event.inputs.server_password }}');
          })();
          "
