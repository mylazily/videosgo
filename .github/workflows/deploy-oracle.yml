# ===========================================
# GitHub Actions CI/CD - 直接部署到 Oracle Cloud ARM
# 方案：GitHub Actions 交叉编译 → SCP 上传 → SSH 重启服务
# ===========================================

name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Cross-compile for ARM64
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: arm64
        run: |
          go mod download
          go build -ldflags="-s -w" -o videosgo-arm64 ./cmd/server

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_SECRET: ${{ secrets.APP_SECRET }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CRYPTO_KEY: ${{ secrets.CRYPTO_KEY }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          envs: APP_SECRET,DB_HOST,DB_USER,DB_PASSWORD,DB_NAME,REDIS_HOST,JWT_SECRET,CRYPTO_KEY
          script: |
            set -e
            echo "=== 部署 videosgo (非Docker) ==="

            # 准备目录
            mkdir -p /opt/videosgo
            cd /opt/videosgo

            # 写入 .env 文件
            printf 'APP_ENV=production\nAPP_PORT=8080\nAPP_SECRET=%s\nDB_HOST=%s\nDB_PORT=5432\nDB_USER=%s\nDB_PASSWORD=%s\nDB_NAME=%s\nDB_SSLMODE=disable\nREDIS_HOST=%s\nREDIS_PORT=6379\nJWT_SECRET=%s\nJWT_EXPIRE_HOURS=72\nCRYPTO_KEY=%s\nCORS_ALLOWED_ORIGINS=*\nLOG_LEVEL=info\n' \
              "$APP_SECRET" "$DB_HOST" "$DB_USER" "$DB_PASSWORD" "$DB_NAME" "$REDIS_HOST" "$JWT_SECRET" "$CRYPTO_KEY" > .env
            chmod 600 .env

            # 确保 nginx 配置存在
            cat > /etc/nginx/conf.d/videosgo.conf << 'NGINX_EOF'
            server {
                listen 80;
                server_name 9901.555554.xyz;

                add_header X-Frame-Options "SAMEORIGIN" always;
                add_header X-Content-Type-Options "nosniff" always;

                client_max_body_size 50m;

                location / {
                    proxy_pass http://127.0.0.1:8080;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_read_timeout 86400;
                }
            }
            NGINX_EOF
            nginx -t && systemctl reload nginx || true

            # 停止旧服务
            systemctl stop videosgo 2>/dev/null || true
            sleep 1

            echo "=== 等待二进制上传 ==="

      - name: Upload binary via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          source: "videosgo-arm64"
          target: "/opt/videosgo/videosgo-arm64"

      - name: Start service via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            set -e
            cd /opt/videosgo

            # 替换二进制
            mv videosgo-arm64 videosgo
            chmod +x videosgo

            # 创建 systemd 服务（如果不存在）
            if [ ! -f /etc/systemd/system/videosgo.service ]; then
              cat > /etc/systemd/system/videosgo.service << 'SERVICE_EOF'
            [Unit]
            Description=VideosGo Backend
            After=network.target postgresql.service

            [Service]
            Type=simple
            WorkingDirectory=/opt/videosgo
            ExecStart=/opt/videosgo/videosgo
            Restart=always
            RestartSec=5
            EnvironmentFile=/opt/videosgo/.env

            [Install]
            WantedBy=multi-user.target
            SERVICE_EOF
              systemctl daemon-reload
              systemctl enable videosgo
            fi

            # 启动服务
            systemctl start videosgo
            sleep 3

            # 健康检查
            HEALTH=$(curl -sf http://localhost:8080/api/v1/health || echo "FAIL")
            if [ "$HEALTH" = "FAIL" ]; then
              echo "❌ 健康检查失败"
              journalctl -u videosgo --no-pager -n 30
              exit 1
            else
              echo "✅ 部署成功: $HEALTH"
            fi
