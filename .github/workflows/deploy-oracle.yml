# ===========================================
# GitHub Actions CI/CD - 部署到 Oracle Cloud ARM
# ===========================================

name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (ARM64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            latest

      - name: Build and push Docker image (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle Cloud via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_SECRET: ${{ secrets.APP_SECRET }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CRYPTO_KEY: ${{ secrets.CRYPTO_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_WEBHOOK_URL: ${{ secrets.TG_WEBHOOK_URL }}
          TG_ADMIN_USER_IDS: ${{ secrets.TG_ADMIN_USER_IDS }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: APP_SECRET,DB_HOST,DB_USER,DB_PASSWORD,DB_NAME,REDIS_HOST,JWT_SECRET,CRYPTO_KEY,TG_BOT_TOKEN,TG_WEBHOOK_URL,TG_ADMIN_USER_IDS
          script: |
            echo "=== 开始部署 videosgo ==="

            mkdir -p /opt/videosgo
            cd /opt/videosgo

            # 写入 .env 文件（env 变量已通过 SSH 传递到远程 shell）
            printf 'APP_ENV=production\nAPP_PORT=8080\nAPP_SECRET=%s\nDB_HOST=%s\nDB_PORT=5432\nDB_USER=%s\nDB_PASSWORD=%s\nDB_NAME=%s\nDB_SSLMODE=disable\nREDIS_HOST=%s\nREDIS_PORT=6379\nJWT_SECRET=%s\nJWT_EXPIRE_HOURS=72\nCRYPTO_KEY=%s\nCORS_ALLOWED_ORIGINS=*\nLOG_LEVEL=info\n' \
              "$APP_SECRET" "$DB_HOST" "$DB_USER" "$DB_PASSWORD" "$DB_NAME" "$REDIS_HOST" "$JWT_SECRET" "$CRYPTO_KEY" > .env

            # TG 相关（可能为空）
            if [ -n "$TG_BOT_TOKEN" ]; then
              printf 'TG_BOT_TOKEN=%s\nTG_WEBHOOK_URL=%s\nTG_ADMIN_USER_IDS=%s\n' \
                "$TG_BOT_TOKEN" "$TG_WEBHOOK_URL" "$TG_ADMIN_USER_IDS" >> .env
            fi

            chmod 600 .env

            # 创建 docker-compose.yml
            cat > docker-compose.yml << 'COMPOSE_EOF'
            services:
              backend:
                image: ghcr.io/mylazily/videosgo:latest
                container_name: videosgo-backend
                restart: unless-stopped
                env_file:
                  - .env
                ports:
                  - "127.0.0.1:8080:8080"
                healthcheck:
                  test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/v1/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 10s

              nginx:
                image: nginx:alpine
                container_name: videosgo-nginx
                ports:
                  - "80:80"
                volumes:
                  - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
                depends_on:
                  - backend
                restart: unless-stopped
            COMPOSE_EOF

            # 创建 nginx 配置
            cat > nginx.conf << 'NGINX_EOF'
            server {
                listen 80;
                server_name 9901.555554.xyz;

                add_header X-Frame-Options "SAMEORIGIN" always;
                add_header X-Content-Type-Options "nosniff" always;

                client_max_body_size 50m;

                location / {
                    proxy_pass http://backend:8080;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_read_timeout 86400;
                }
            }
            NGINX_EOF

            # 拉取并启动
            docker compose pull backend
            docker compose up -d --force-recreate backend nginx
            docker image prune -f

            echo "=== 部署完成 ==="
            sleep 5
            curl -s http://localhost:8080/api/v1/health || echo "警告: 健康检查失败"
