# ===========================================
# GitHub Actions CI/CD - 部署到 Oracle Cloud (141.148.0.209)
# 域名: 9901.555554.xyz
# ===========================================

name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle Cloud via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 141.148.0.209
          username: root
          password: zxc12345@.
          script: |
            echo "=== 开始部署 ==="
            
            # 创建应用目录
            mkdir -p /opt/videosgo
            cd /opt/videosgo
            
            # 创建 docker-compose.yml
            cat > docker-compose.yml << 'EOF'
            version: '3.8'
            
            services:
              postgres:
                image: postgres:16-alpine
                container_name: videosgo-postgres
                environment:
                  POSTGRES_USER: videosgo
                  POSTGRES_PASSWORD: videosgo123
                  POSTGRES_DB: videosgo
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                ports:
                  - "127.0.0.1:5432:5432"
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U videosgo"]
                  interval: 5s
                  timeout: 5s
                  retries: 5
            
              redis:
                image: redis:7-alpine
                container_name: videosgo-redis
                volumes:
                  - redis_data:/data
                ports:
                  - "127.0.0.1:6379:6379"
                healthcheck:
                  test: ["CMD", "redis-cli", "ping"]
                  interval: 5s
                  timeout: 5s
                  retries: 5
            
              backend:
                image: ghcr.io/mylazily/videosgo:latest
                container_name: videosgo-backend
                environment:
                  APP_ENV: production
                  APP_PORT: 8080
                  APP_SECRET: ${{ secrets.APP_SECRET }}
                  DB_HOST: postgres
                  DB_PORT: 5432
                  DB_USER: videosgo
                  DB_PASSWORD: videosgo123
                  DB_NAME: videosgo
                  DB_SSLMODE: disable
                  REDIS_HOST: redis
                  REDIS_PORT: 6379
                  JWT_SECRET: ${{ secrets.JWT_SECRET }}
                  JWT_EXPIRE_HOURS: 72
                  CRYPTO_KEY: ${{ secrets.CRYPTO_KEY }}
                  TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
                  TG_WEBHOOK_URL: https://9901.555554.xyz/api/v1/tg/webhook
                  TG_ADMIN_USER_IDS: ${{ secrets.TG_ADMIN_USER_IDS }}
                  CORS_ALLOWED_ORIGINS: "*"
                  LOG_LEVEL: info
                ports:
                  - "127.0.0.1:8080:8080"
                depends_on:
                  postgres:
                    condition: service_healthy
                  redis:
                    condition: service_healthy
                restart: unless-stopped
                healthcheck:
                  test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/v1/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 10s
            
              nginx:
                image: nginx:alpine
                container_name: videosgo-nginx
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
                depends_on:
                  - backend
                restart: unless-stopped
            
            volumes:
              postgres_data:
              redis_data:
            EOF
            
            # 创建 nginx 配置
            cat > nginx.conf << 'EOF'
            server {
                listen 80;
                server_name 9901.555554.xyz;
                
                location / {
                    proxy_pass http://backend:8080;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_read_timeout 86400;
                }
            }
            EOF
            
            # 拉取并启动
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f
            
            echo "=== 部署完成 ==="
            echo "健康检查: https://9901.555554.xyz/api/v1/health"
