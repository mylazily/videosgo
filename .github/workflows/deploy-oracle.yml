# ===========================================
# GitHub Actions CI/CD - 部署到 Oracle Cloud ARM (141.148.0.209)
# ===========================================

name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (ARM64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            latest

      - name: Build and push Docker image (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle Cloud via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 141.148.0.209
          username: root
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            echo "=== 开始部署 videosgo ==="

            # 创建应用目录
            mkdir -p /opt/videosgo
            cd /opt/videosgo

            # 创建 docker-compose.yml
            cat > docker-compose.yml << 'COMPOSE_EOF'
            version: '3.8'

            services:
              backend:
                image: ghcr.io/mylazily/videosgo:latest
                container_name: videosgo-backend
                restart: unless-stopped
                environment:
                  APP_ENV: production
                  APP_PORT: 8080
                  APP_SECRET: ${{ secrets.APP_SECRET }}
                  DB_HOST: ${{ secrets.DB_HOST }}
                  DB_PORT: 5432
                  DB_USER: ${{ secrets.DB_USER }}
                  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
                  DB_NAME: ${{ secrets.DB_NAME }}
                  DB_SSLMODE: disable
                  REDIS_HOST: ${{ secrets.REDIS_HOST }}
                  REDIS_PORT: 6379
                  JWT_SECRET: ${{ secrets.JWT_SECRET }}
                  JWT_EXPIRE_HOURS: 72
                  CRYPTO_KEY: ${{ secrets.CRYPTO_KEY }}
                  TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
                  TG_WEBHOOK_URL: ${{ secrets.TG_WEBHOOK_URL }}
                  TG_ADMIN_USER_IDS: ${{ secrets.TG_ADMIN_USER_IDS }}
                  CORS_ALLOWED_ORIGINS: "*"
                  LOG_LEVEL: info
                ports:
                  - "127.0.0.1:8080:8080"
                depends_on:
                  postgres:
                    condition: service_healthy
                  redis:
                    condition: service_healthy
                healthcheck:
                  test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/v1/health"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 10s

              nginx:
                image: nginx:alpine
                container_name: videosgo-nginx
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
                depends_on:
                  - backend
                restart: unless-stopped
            COMPOSE_EOF

            # 创建 nginx 配置
            cat > nginx.conf << 'NGINX_EOF'
            server {
                listen 80;
                server_name 9901.555554.xyz;

                # 安全头
                add_header X-Frame-Options "SAMEORIGIN" always;
                add_header X-Content-Type-Options "nosniff" always;

                # 请求体大小限制
                client_max_body_size 50m;

                location / {
                    proxy_pass http://backend:8080;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_read_timeout 86400;
                }
            }
            NGINX_EOF

            # 拉取并启动
            docker compose pull backend
            docker compose up -d --force-recreate backend nginx
            docker image prune -f

            echo "=== 部署完成 ==="
            echo "健康检查: curl -s http://localhost:8080/api/v1/health"
            curl -s http://localhost:8080/api/v1/health || echo "警告: 健康检查失败"
